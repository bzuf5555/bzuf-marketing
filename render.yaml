services:
  - type: web
    name: bzuf-marketing-bot
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: bzuf-marketing-bot
          property: host
      - key: WEBHOOK_SECRET
        generateValue: true
